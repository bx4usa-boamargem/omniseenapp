# Supabase: migrations + Edge Functions (runs on push to main)
name: Supabase Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # permite re-run manual

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_ID: efraktxestopfjnnhept

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Apply migrations
        run: supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}" || echo "No new migrations"

      - name: Deploy all Edge Functions
        run: |
          for fn in $(ls supabase/functions/ | grep -v _shared); do
            echo "→ Deploying $fn..."
            supabase functions deploy "$fn" --no-verify-jwt || echo "⚠️ Failed: $fn"
          done
