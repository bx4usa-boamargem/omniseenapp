name: Auto Publish Ready Articles

on:
  schedule:
    - cron: '0 8 * * *'  # 8:00 UTC = 05:00 Brasília
  workflow_dispatch:

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Auto Publish
        run: |
          curl -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/auto-publish-ready-articles" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
