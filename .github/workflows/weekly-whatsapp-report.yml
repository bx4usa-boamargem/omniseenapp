name: Weekly WhatsApp Report

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  send-whatsapp-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Send WhatsApp Reports
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/send-whatsapp-report" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}')

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "WhatsApp reports sent successfully"
            exit 0
          else
            echo "WhatsApp reports failed with status $http_code"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
